name: Ember
options:
  bundleIdPrefix: com.ember
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

packages:
  EmberCore:
    path: ../

targets:
  Ember:
    type: application
    platform: iOS
    sources:
      - path: Ember
    resources:
      - path: Ember/Assets.xcassets
      - path: Ember/Resources/Info.plist
    info:
      path: Ember/Resources/Info.plist
      # NOTE: xcodegen *generates* this Info.plist from the keys below on every
      # `xcodegen generate`, overwriting hand edits. Add Info.plist keys HERE.
      properties:
        # Marketing version (1.0). Bump CFBundleVersion for every TestFlight upload —
        # App Store Connect rejects a build number it has already seen.
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "7"
        LSRequiresIPhoneOS: true
        # Without a launch screen, iOS runs the app in scaled-down compatibility
        # mode (letterboxed with black bars). An empty UILaunchScreen opts into
        # native full-screen rendering.
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSUserNotificationsUsageDescription: "Ember sends optional reminders for meals and hydration at times you choose. The app is fully usable without them."
        NSHealthShareUsageDescription: "Ember can read your workouts, body weight, steps, distance, active energy, heart rate, heart-rate variability, VO₂max, blood oxygen, sleep, and mindful minutes from Apple Health so your coach and progress reflect real data. Reading is optional — deny it and Ember works fully on data you enter manually. Ember only reads and never writes to Health."
        # Apple's App Store static analysis flags the HealthKit *entitlement* as
        # referencing write APIs regardless of whether the app calls them, so this
        # purpose string is REQUIRED to pass upload validation even though Ember is
        # read-only and never writes to Health. (Removing it broke the 1.1/7 upload.)
        NSHealthUpdateUsageDescription: "Ember does not write to Apple Health — it only reads your data. This permission is never requested or used."
        NSCameraUsageDescription: "Ember uses the camera so you can photograph a meal and estimate its macros. This is optional — you can pick an existing photo instead, and Ember never uploads photos anywhere except to estimate macros via the Anthropic API with your own key."
    # NOTE: xcodegen *generates* Ember/Ember.entitlements from the block below on every
    # `xcodegen generate`. Like Ember.xcodeproj it is a build artifact — git-ignored, never
    # hand-edited or committed. Add entitlement keys HERE.
    entitlements:
      path: Ember/Ember.entitlements
      properties:
        com.apple.developer.healthkit: true
    dependencies:
      - package: EmberCore
    settings:
      base:
        PRODUCT_NAME: Ember
        PRODUCT_BUNDLE_IDENTIFIER: com.nimmynurner.ember
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_LANGUAGE: en
        TARGETED_DEVICE_FAMILY: "1"   # iPhone only
        SUPPORTS_MAC_DESIGNED_FOR_IPAD: NO
        # --- Signing (automatic / Xcode-managed) ---
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "GW3SLFGTT4"   # 10-char Apple Developer Team ID
